<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
 viewBox="0 0 607 324"
 preserveAspectRatio="xMidYMid meet"
 overflow="visible">

<defs>
  <!--
    Neon tube filter: creates a glowing tube look with bright hot core + layered bloom.
    Applied to the fill color, so when SMIL switches to green the bloom also goes green.
  -->
  <filter id="neon-glow" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB">
    <!-- Outer diffuse haze: very wide, low intensity bloom -->
    <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="haze"/>
    <!-- Mid bloom: medium spread -->
    <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="bloom"/>
    <!-- Inner tight halo: just outside the letter strokes -->
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="halo"/>
    <!-- Bright white-hot core: boost all color channels toward white.
         Gives the illusion of a tube lit from within.
         slope=0.12 intercept=0.9 → any colored pixel becomes near-white -->
    <feColorMatrix in="SourceGraphic" type="matrix"
      values="0.12 0    0    0 0.9
              0    0.12 0    0 0.9
              0    0    0.12 0 0.9
              0    0    0    1 0" result="white-core"/>
    <feGaussianBlur in="white-core" stdDeviation="0.6" result="core"/>
    <!-- Composite back-to-front: haze behind, bright core on top -->
    <feMerge>
      <feMergeNode in="haze"/>
      <feMergeNode in="bloom"/>
      <feMergeNode in="halo"/>
      <feMergeNode in="SourceGraphic"/>
      <feMergeNode in="core"/>
    </feMerge>
  </filter>
</defs>

<g transform="translate(0,324) scale(0.1,-0.1)"
fill="#ff00c0" stroke="none" filter="url(#neon-glow)">

  <!--
    FLICKER SEQUENCE (9s cycle, two flicker bursts, offset from logo1 for variety):
    Burst 1 at ~5s:  off → GREEN flash → off → pink (normal)
    Burst 2 at ~7.5s: off → GREEN flash → off → pink (normal)
    calcMode="discrete" makes transitions instant (realistic neon snap, not fade)
  -->
  <animate
    attributeName="opacity"
    values="1;1;0.06;1;0.04;1;1;1;0.06;1;0.04;1;1"
    keyTimes="0;0.52;0.54;0.565;0.575;0.59;0.78;0.84;0.85;0.865;0.875;0.89;1"
    dur="9s"
    repeatCount="indefinite"
    calcMode="discrete"/>

  <animate
    attributeName="fill"
    values="#ff00c0;#ff00c0;#ff00c0;#39ff14;#39ff14;#ff00c0;#ff00c0;#ff00c0;#ff00c0;#39ff14;#39ff14;#ff00c0;#ff00c0"
    keyTimes="0;0.52;0.54;0.565;0.575;0.59;0.78;0.84;0.85;0.865;0.875;0.89;1"
    dur="9s"
    repeatCount="indefinite"
    calcMode="discrete"/>

