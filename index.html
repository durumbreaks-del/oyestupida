<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oye Estupida</title>
  <link rel="icon" type="image/png" href="img/favico.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { corePlugins: { ringWidth: false, ringColor: false, ringOpacity: false, ringOffsetWidth: false } }</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    *:focus { outline: none; }

    .site-logo {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
      width: 100px;
      max-width: 100px;
    }

    .site-logo img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    body.grayscale-mode {
      filter: grayscale(100%);
      transition: filter 0.6s ease;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: url('mouse.png') 0 0, auto;
      background-image: url('img/bg1.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      transition: background-image 0.6s ease;
    }

    body.night-mode {
      background-image: url('img/bg_night.png');
    }

    /* ---------- Ring ---------- */
    .ring {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 360px;
      height: 360px;
      z-index: 20;
      transition: opacity 0.4s, transform 0.4s;
    }

    .ring.hidden {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.6);
      pointer-events: none;
    }

    .ring-btn {
      position: absolute;
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid #ff00c0;
      background: rgba(255, 105, 180, 0.1);
      color: #ff00c0;
      font-family: 'Courier New', monospace;
      font-size: 10px; font-weight: bold;
      text-align: center;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s ease, opacity 0.4s ease, left 0.4s ease, top 0.4s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ring-btn .tarot-button-label,
    .ring-btn .mini-btn-label,
    .ring-btn .contact-button-label {
      display: none;
    }

    .ring-btn-tooltip {
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      padding: 6px 12px;
      border-radius: 999px;
      background: #ff00c0;
      color: #000;
      box-shadow: 0 0 12px rgba(255,0,192,0.5);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .ring-btn:hover .ring-btn-tooltip,
    .ring-btn.laser-hover .ring-btn-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .frame-tooltip {
      position: fixed;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      padding: 6px 12px;
      border-radius: 999px;
      background: #ff00c0;
      color: #000;
      box-shadow: 0 0 12px rgba(255,0,192,0.5);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 40;
    }
    .frame-tooltip.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .couch-tooltip {
      position: fixed;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      padding: 6px 12px;
      border-radius: 999px;
      background: #ff00c0;
      color: #000;
      box-shadow: 0 0 12px rgba(255,0,192,0.5);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 40;
    }
    .couch-tooltip.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Day/Night interruptor */
    .daynight-switch {
      position: fixed;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 64px;
      border-radius: 999px;
      border: 1.5px solid #ff00c0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1200;
      box-shadow: 0 0 12px rgba(255,0,192,0.4);
    }
    .daynight-toggle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ff0;
      box-shadow: 0 0 10px rgba(255,255,0,0.8);
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      transform: translateY(-12px);
    }
    .daynight-switch.night .daynight-toggle {
      transform: translateY(12px);
      background: #0ff;
      box-shadow: 0 0 10px rgba(0,255,255,0.8);
    }

    /* Tarot tooltip: nudge slightly up */
    .ring-btn.tarot-btn .ring-btn-tooltip {
      bottom: calc(120% + 15px);
    }

    /* CAKES button tooltip: lift a bit */
    .ring-btn.cakes-btn .ring-btn-tooltip {
      bottom: calc(120% + 50px);
    }

    /* CONTACT button tooltip: nudge up */
    .ring-btn.contact-btn .ring-btn-tooltip {
      bottom: calc(120% + 30px);
    }

    /* TATTOOS button tooltip: lift a bit */
    .ring-btn.tattoos-btn .ring-btn-tooltip {
      bottom: calc(120% + 20px);
    }

    /* STURM button is huge → lift tooltip more */
    .ring-btn.sturm-btn .ring-btn-tooltip {
      bottom: calc(120% + 80px);
    }

    .ring-btn:hover,
    .ring-btn.laser-hover {
      background: #ff00c0;
      color: #000;
      box-shadow: 0 0 20px rgba(255,0,192,0.6), 0 0 40px rgba(255,0,192,0.3);
      transform: scale(1.15);
    }

    .ring-btn:active {
      transform: scale(0.95);
      background: #ff00c0;
    }

    .ring-btn.selected {
      background: #ff00c0;
      color: #000;
      box-shadow: 0 0 14px rgba(255,0,192,0.5);
    }

    .ring-btn.hit {
      animation: btnHit 0.4s ease-out;
    }

    .ring-btn.vibrate-once {
      animation: ringVibrate 0.18s linear 0s 2;
    }

    @keyframes ringVibrate {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-2px); }
      50%  { transform: translateX(2px); }
      75%  { transform: translateX(-1px); }
      100% { transform: translateX(0); }
    }

    .ring-btn.tarot-btn {
      width: 80px;
      height: 56px;
      border-radius: 12px;
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .ring-btn.tarot-btn:hover {
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .ring-btn.contact-btn {
      width: 80px;
      height: 56px;
      border-radius: 12px;
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .ring-btn.tattoos-btn,
    .ring-btn.cakes-btn,
    .ring-btn.sturm-btn {
      width: 80px;
      height: 56px;
      border-radius: 12px;
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .ring-btn.contact-btn:hover {
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .ring-btn.tattoos-btn:hover,
    .ring-btn.cakes-btn:hover,
    .ring-btn.sturm-btn:hover {
      background: transparent;
      border-color: transparent;
      box-shadow: none !important;
      transform: none;
      color: inherit;
    }

    /* STURMZX2 & TATTOOS buttons: never show pink selected/hover glow */
    .ring-btn.sturm-btn,
    .ring-btn.sturm-btn:hover,
    .ring-btn.sturm-btn.selected,
    .ring-btn.sturm-btn.hit,
    .ring-btn.tattoos-btn,
    .ring-btn.tattoos-btn:hover,
    .ring-btn.tattoos-btn.selected,
    .ring-btn.tattoos-btn.hit {
      background: transparent !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }

    .tarot-button-cards {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .tarot-button-card {
      position: absolute;
      width: 28px;
      height: 42px;
      border-radius: 4px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      box-shadow: none;
      filter: hue-rotate(-20deg) saturate(1.6);
      transition: transform 0.3s ease, opacity 0.3s ease;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.6);
    }

    /* Slight resting offsets so all cards peek out a bit */
    .ring-btn.tarot-btn .tarot-button-card.c1 {
      transform: translate(-80%, -40%) scale(1.6);
    }
    .ring-btn.tarot-btn .tarot-button-card.c2 {
      transform: translate(-60%, -55%) scale(1.6);
    }
    .ring-btn.tarot-btn .tarot-button-card.c3 {
      transform: translate(-40%, -60%) scale(1.6);
    }
    .ring-btn.tarot-btn .tarot-button-card.c4 {
      transform: translate(-20%, -40%) scale(1.6);
    }

    .tarot-button-card.c1 { background-image: url('img/tarot/tarot4.png'); z-index: 1; }
    .tarot-button-card.c2 { background-image: url('img/tarot/tarot3.png'); z-index: 2; }
    .tarot-button-card.c3 { background-image: url('img/tarot/tarot2.png'); z-index: 3; }
    .tarot-button-card.c4 { background-image: url('img/tarot/tarot1.png'); z-index: 4; }

    .tarot-button-label {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff00c0;
      font-family: 'Courier New', monospace;
      pointer-events: none;
      z-index: 2;
    }

    .contact-button-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .contact-button-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .contact-button-icon svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #ff00c0;
      stroke-width: 2.5;
    }

    .contact-button-label {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff00c0;
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }

    .mini-btn-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .mini-btn-label {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff00c0;
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }

    .mini-btn-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 140px;
      height: 140px;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mini-btn-icon svg {
      width: 34px;
      height: 34px;
      fill: none;
      stroke: #ff00c0;
      stroke-width: 2.3;
    }

    .ring-btn.tarot-btn:hover .tarot-button-card.c1 {
      transform: translate(-90%, -30%) rotate(-18deg) scale(2);
    }

    .ring-btn.tarot-btn:hover .tarot-button-card.c2 {
      transform: translate(-50%, -60%) rotate(-6deg) scale(2);
    }

    .ring-btn.tarot-btn:hover .tarot-button-card.c3 {
      transform: translate(-10%, -60%) rotate(6deg) scale(2);
    }

    .ring-btn.tarot-btn:hover .tarot-button-card.c4 {
      transform: translate(30%, -30%) rotate(18deg) scale(2);
    }

    @keyframes btnHit {
      0%   { transform: scale(1.3); background: #fff; box-shadow: 0 0 30px #fff, 0 0 60px #ff00c0; }
      50%  { transform: scale(0.85); }
      100% { transform: scale(1); }
    }

    .frame-btn {
      pointer-events: auto !important;
      transform-origin: top center;
      transition: filter 0.2s, width 0.4s ease, max-width 0.4s ease;
    }

    .frame-btn.laser-hover {
      filter: brightness(1.25);
    }

    .frame-btn.hit {
      animation: frameHit 0.4s ease-out;
    }

    #frameArt {
      object-fit: contain;
      border-radius: 0;
      clip-path: none;
    }

    @keyframes frameHit {
      0%   { filter: brightness(1.8); }
      100% { filter: brightness(1); }
    }

    /* ---------- Cakes order button & form ---------- */
    .cakes-order-btn {
      position: fixed;
      right: 20px;
      bottom: 24px;
      z-index: 1200;
      padding: 6px 12px;
      border-radius: 999px;
      border: 0;
      background: #ff00c0;
      color: #000;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      box-shadow: none;
      transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    .cakes-order-btn.visible {
      display: inline-flex;
    }
    .cakes-order-btn:hover,
    .cakes-order-btn.laser-hover {
      transform: translateY(-2px);
      box-shadow: none;
      filter: brightness(1.05);
    }

    .cakes-order-form-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 0, 10, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1300;
    }
    .cakes-order-form-overlay.visible {
      display: flex;
    }
    .cakes-order-form {
      width: min(420px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px 22px;
      border-radius: 18px;
      border: 1px solid #ff00c0;
      background: radial-gradient(circle at top, rgba(255,0,192,0.15), transparent 60%), rgba(10, 0, 20, 0.96);
      box-shadow: 0 0 30px rgba(255,0,192,0.7);
      font-family: 'Courier New', monospace;
      color: #fdf0ff;
    }
    .cakes-order-form h3 {
      margin: 0 0 14px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #ff00c0;
      text-align: center;
    }
    .cakes-order-form p {
      font-size: 11px;
      line-height: 1.5;
      margin: 0 0 14px;
      color: #ffbdf1;
      text-align: center;
    }
    .cakes-order-form label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 10px 0 4px;
      color: #ffdaf7;
    }
    .cakes-order-step {
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .cakes-order-step.active {
      display: flex;
    }
    .cakes-order-form input[type="text"],
    .cakes-order-form input[type="date"],
    .cakes-order-form textarea,
    .cakes-order-form select {
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(255,0,192,0.4);
      background: rgba(10,0,20,0.9);
      color: #fff;
      padding: 7px 9px;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .cakes-order-form textarea {
      min-height: 70px;
      resize: vertical;
    }
    .cakes-order-form small {
      display: block;
      font-size: 9px;
      color: #ff9eea;
      margin-top: 2px;
    }
    .cakes-order-form .colors-row {
      display: flex;
      gap: 6px;
    }
    .cakes-order-form .colors-row input[type="color"] {
      width: 100%;
      height: 44px;
      flex: 1 1 0;
      padding: 0;
      border-radius: 10px;
      border: 1px solid rgba(255,0,192,0.4);
      background: rgba(10,0,20,0.9);
      cursor: pointer;
    }
    .cakes-order-actions {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .cakes-order-submit {
      flex: 1;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #ff00c0;
      background: #ff00c0;
      color: #000;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      cursor: pointer;
    }
    .cakes-order-submit:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 20px rgba(255,0,192,0.8);
    }
    .cakes-order-cancel {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: #fff;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      white-space: nowrap;
    }
    .cakes-order-cancel:hover {
      background: rgba(255,255,255,0.08);
    }

    .couch-kiss {
      position: fixed;
      font-size: 42px;
      line-height: 1;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: none;
      transform: translate(-50%, -50%);
    }
    .couch-kiss.animate {
      animation: kissRise 1.2s ease-out forwards;
    }
    @keyframes kissRise {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.6);
      }
      25% {
        opacity: 1;
        transform: translate(-50%, calc(-50% - 20px)) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, calc(-50% - 100px)) scale(1.1);
      }
    }

    /* ---------- Section overlay ---------- */
    .section-overlay {
      position: fixed;
      border-radius: 50%;
      border: none;
      background: rgba(20, 0, 15, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      z-index: 900;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      opacity: 0;
      pointer-events: none;
      z-index: 850;
      transition: opacity 0.4s ease;
    }

    .modal-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .section-overlay.expanding {
      pointer-events: auto;
      opacity: 1;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0;
    }

    .section-overlay.bio-modal.expanding,
    .section-overlay.sturmzx2-modal.expanding,
    .section-overlay.tarot-modal.expanding,
    .section-overlay.contact-modal.expanding,
    .section-overlay.paintings-modal.expanding,
    .section-overlay.tattoos-modal.expanding {
      top: 50% !important;
      left: 50% !important;
      width: fit-content !important;
      height: fit-content !important;
      max-width: min(94vw, 480px);
      max-height: 90vh;
      transform: translate(-50%, -50%) !important;
      border-radius: 12px;
      padding: 32px;
      overflow: auto;
    }

    .section-overlay.sturmzx2-modal.expanding {
      width: 50vw !important;
      height: 50vh !important;
      max-width: none;
      max-height: none;
    }

    .section-overlay.sturmzx2-modal.expanding::-webkit-scrollbar {
      width: 60px;
    }

    .section-overlay.bio-modal.expanding {
      width: min(94vw, 520px) !important;
      height: min(78vh, 720px) !important;
      overflow: hidden !important; /* modal itself should not scroll */
    }

    .section-overlay.sturmzx2-modal .bio-content {
      max-width: 100%;
    }

    .section-overlay.sturmzx2-modal .bio-text {
      text-align: justify;
    }

    .section-overlay.tarot-modal.expanding {
      max-width: min(94vw, 520px);
    }

    /* All modals: close animation — slide down to bottom */
    .section-overlay.modal-closing {
      top: 100% !important;
      left: 50% !important;
      width: 85% !important;
      max-width: 420px !important;
      height: 55vh !important;
      transform: translate(-50%, -100%) scale(0.92) !important;
      border-radius: 12px;
    }

    /* Cakes modal: slide in from top, out to bottom, full width */
    .section-overlay.cakes-modal.expanding {
      border: none;
      border-radius: 0;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      transform: none !important;
    }

    .section-overlay.cakes-modal.cakes-closing {
      border: none !important;
      border-radius: 0 !important;
      top: 100% !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      transform: none !important;
    }

    .tarot-hero {
      width: 100%;
      max-width: 260px;
      height: 200px;
      object-fit: contain;
      border-radius: 8px;
      margin: 0 auto;
      display: block;
      background: #fff;
    }

    .tarot-title {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #ff00c0;
      color: #000;

    .cakes-container {
      position: relative;

      flex-shrink: 0;
    }

      left: 50%;

      width: 50%;
      height: 50%;

      justify-content: center;
    }

    .cakes-center img {
      width: 100%;
      height: 100%;

    }

    .cakes-center.hit img {
      animation: cakeCenterHit 0.3s ease-out;
    }

    @keyframes cakeCenterHit {
      0% { transform: scale(1.2); filter: brightness(1.5); }
      100% { transform: scale(1); filter: brightness(1); }
    }

      background: transparent;
      padding: 28px;
    }

      text-align: center;
      list-style: none;
    }

    .cakes-recipe-title {
      font-size: 14px;
      font-weight: bold;
      color: #ff00c0;
      text-transform: uppercase;
      letter-spacing: 8px;
      margin-bottom: 20px;
      font-family: 'Courier New', monospace;
    }

    .cakes-recipe-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .cakes-recipe-list li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13px;
      line-height: 2.2;
      color: rgba(255, 105, 180, 0.9);
      font-family: 'Courier New', monospace;

    .cakes-orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 88%;
      height: 88%;
      margin: -44% 0 0 -44%;
      transform-origin: center center;
      animation: orbitSpin 30s linear infinite;
      z-index: 4;
    }

    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes orbitCounterSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    .cakes-orbit-item {
      position: absolute;
      width: 22%;
      height: 22%;
      min-width: 80px;
      min-height: 80px;
      cursor: inherit;
      transition: all 0.3s ease;
      transform: translate(-50%, -50%);
      animation: orbitCounterSpin 30s linear infinite;
      z-index: 5;
    }

    .cakes-orbit-item.hit {
      animation: cakeHit 0.4s ease-out, orbitCounterSpin 30s linear infinite;
    }

    @keyframes cakeHit {
      0%   { filter: brightness(1.3); }
      100% { filter: brightness(1); }
    }

    .cakes-orbit-item:hover,
    .cakes-orbit-item.laser-hover {
      z-index: 3;
    }

    .cakes-orbit-item.laser-hover img {
      transform: scale(1.15);
    }

    .cakes-orbit-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
      animation: cakeUnfold 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .cakes-orbit-item:nth-child(2) img { animation-delay: 0.12s; }
    .cakes-orbit-item:nth-child(3) img { animation-delay: 0.19s; }
    .cakes-orbit-item:nth-child(4) img { animation-delay: 0.26s; }
    .cakes-orbit-item:nth-child(5) img { animation-delay: 0.33s; }
    .cakes-orbit-item:nth-child(6) img { animation-delay: 0.4s; }
    .cakes-orbit-item:nth-child(7) img { animation-delay: 0.47s; }
    .cakes-orbit-item:nth-child(8) img { animation-delay: 0.54s; }
    .cakes-orbit-item:nth-child(9) img { animation-delay: 0.61s; }

    @keyframes cakeUnfold {

  <script type="module">
    import {
      Space, Body, BodyType, Vec2, Circle, Polygon,
    } from "https://cdn.jsdelivr.net/npm/@newkrok/nape-js/dist/index.js";

    // Recolor favicon to pink while preserving transparency
    (function tintFaviconToPink() {
      const link = document.querySelector("link[rel='icon']");
      if (!link || !link.href) return;
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        ctx.drawImage(img, 0, 0);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const pink = { r: 255, g: 105, b: 180 };
        for (let i = 0; i < data.length; i += 4) {
          const a = data[i + 3];
          if (a === 0) continue;
          const gray = (data[i] + data[i + 1] + data[i + 2]) / (3 * 255);
          data[i]     = pink.r * gray;
          data[i + 1] = pink.g * gray;
          data[i + 2] = pink.b * gray;
        }
        ctx.putImageData(imgData, 0, 0);
        link.href = canvas.toDataURL('image/png');
      };
      img.src = link.href;
    })();

    (function() {
      const logos = ['img/oyestupida-logo1.png', 'img/oyestupida-logo2.png'];
      const img = document.getElementById('siteLogoImg');
      if (img) img.src = logos[Math.random() < 0.5 ? 0 : 1];
    })();

    /* ---------- Day / Night background ---------- */
    (function() {
      const NIGHT_HOUR = 20; // 20hs = 8pm
      const STORAGE_KEY = 'bgTheme';
      const switchEl = document.getElementById('dayNightSwitch');
      const toggleEl = switchEl ? switchEl.querySelector('.daynight-toggle') : null;

      function applyTheme(theme) {
        if (theme === 'night') {
          document.body.classList.add('night-mode');
          if (switchEl) switchEl.classList.add('night');
        } else {
          document.body.classList.remove('night-mode');
          if (switchEl) switchEl.classList.remove('night');
        }
      }

      let theme = localStorage.getItem(STORAGE_KEY);
      if (!theme) {
        const now = new Date();
        const hour = now.getHours();
        theme = hour >= NIGHT_HOUR ? 'night' : 'day';
      }
      applyTheme(theme);

      if (switchEl && toggleEl) {
        switchEl.addEventListener('click', (e) => {
          e.stopPropagation();
          theme = theme === 'night' ? 'day' : 'night';
          localStorage.setItem(STORAGE_KEY, theme);
          applyTheme(theme);
        });
      }
    })();
    const ring = document.getElementById('ring');
    const previewImg = document.getElementById('previewImg');
    const previewContainer = document.getElementById('previewContainer');
    const hotspotDot = document.getElementById('hotspotDot');
    const vectorDot = document.getElementById('vectorDot');
    const vectorLine = document.getElementById('vectorLine');
    const saveBtn = document.getElementById('saveBtn');
    const cakesOrderBtn = document.getElementById('cakesOrderBtn');
    const cakesOrderOverlay = document.getElementById('cakesOrderOverlay');
    const cakesOrderForm = document.getElementById('cakesOrderForm');
    const cakesOrderCancel = document.getElementById('cakesOrderCancel');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const sectionOverlay = document.getElementById('sectionOverlay');
    const sectionContent = document.getElementById('sectionContent');
    const exitBtn = document.getElementById('exitBtn');

    let imgW = 32, imgH = 32;
    let hotX = 0, hotY = 0;
    let shootAngle = -0.78;
    const ARROW_LEN = 60;
    let sectionOpen = false;

    const tmpImg = new Image();
    tmpImg.onload = () => {
      imgW = tmpImg.naturalWidth;
      imgH = tmpImg.naturalHeight;
      const saved = localStorage.getItem('gunConfig');
      if (saved) {
        try {
          const s = JSON.parse(saved);
          if (s && typeof s.hotX === 'number' && typeof s.hotY === 'number' && typeof s.angle === 'number') {
            hotX = s.hotX;
            hotY = s.hotY;
            shootAngle = s.angle;
            saveBtn.textContent = 'saved \u2713';
            saveBtn.classList.add('saved');
            document.getElementById('preview').classList.add('folded');
          }
        } catch (e) { /* ignore corrupt saved config */ }
      }
      applyCursor(hotX, hotY);
      updatePreview();
      requestAnimationFrame(() => { applyCursor(hotX, hotY); updatePreview(); });
    };
    tmpImg.src = 'mouse.png';

    function getImgRect() {
      const rect = previewImg.getBoundingClientRect();
      const cRect = previewContainer.getBoundingClientRect();
      return {
        offX: rect.left - cRect.left,
        offY: rect.top - cRect.top,
        w: rect.width,
        h: rect.height
      };
    }

    function applyCursor(xRatio, yRatio) {
      hotX = Math.max(0, Math.min(1, xRatio));
      hotY = Math.max(0, Math.min(1, yRatio));
      const maxW = Math.min(imgW, 128);
      const maxH = Math.min(imgH, 128);
      const hx = Math.round(hotX * (maxW - 1));
      const hy = Math.round(hotY * (maxH - 1));
      const rule = `url('mouse.png') ${hx} ${hy}, auto`;
      document.body.style.cursor = rule;
      document.querySelectorAll('.ring-btn, .exit-btn, .mute-btn, .frame-btn, .social-icons a, .tarot-contact-btn, .gallery-item, .cakes-orbit-item, .cakes-center').forEach(b => b.style.cursor = rule);
      hotspotDot.style.cursor = 'grab';
    }

    function updatePreview() {
      const r = getImgRect();
      const hpx = r.offX + hotX * r.w;
      const hpy = r.offY + hotY * r.h;
      hotspotDot.style.left = hpx + 'px';
      hotspotDot.style.top  = hpy + 'px';
      const vEndX = hpx + Math.cos(shootAngle) * ARROW_LEN;
      const vEndY = hpy + Math.sin(shootAngle) * ARROW_LEN;
      vectorDot.style.left = vEndX + 'px';
      vectorDot.style.top  = vEndY + 'px';
      vectorLine.setAttribute('x1', hpx);
      vectorLine.setAttribute('y1', hpy);
      vectorLine.setAttribute('x2', vEndX);
      vectorLine.setAttribute('y2', vEndY);
    }

    /* ---------- Dragging ---------- */
    let draggingHot = false;
    let draggingVec = false;

    hotspotDot.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      draggingHot = true;
      hotspotDot.classList.add('dragging');
    });

    vectorDot.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      draggingVec = true;
      vectorDot.classList.add('dragging');
    });

          const w = window.innerWidth;
          const h = window.innerHeight;
          const thickness = 80;

          const floor = new Body(BodyType.STATIC, new Vec2(w / 2, h + thickness / 2));
          floor.shapes.add(new Polygon(Polygon.box(w + 400, thickness)));
          floor.space = cakesSpace;

          const left = new Body(BodyType.STATIC, new Vec2(-thickness / 2, h / 2));
          left.shapes.add(new Polygon(Polygon.box(thickness, h * 2)));
          left.space = cakesSpace;

          const right = new Body(BodyType.STATIC, new Vec2(w + thickness / 2, h / 2));
          right.shapes.add(new Polygon(Polygon.box(thickness, h * 2)));

    function checkAllCollisions(bx, by, ballSize) {
      const ballCx = bx + ballSize / 2;
      const ballCy = by + ballSize / 2;

      if (exitBtn.classList.contains('visible')) {
        const r = exitBtn.getBoundingClientRect();
        const cx = r.left + r.width / 2;

          const r = b.el.getBoundingClientRect();

          const cy = r.top + r.height / 2;
          const dist = Math.hypot(ballCx - cx, ballCy - cy);
          if (dist < r.width / 2 + ballSize / 2) {
            return b;
          }
        }
      }

      const socialLinks = document.querySelectorAll('.social-icons a');
      for (const link of socialLinks) {
        const r = link.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dist = Math.hypot(ballCx - cx, ballCy - cy);
        if (dist < r.width / 2 + ballSize / 2) {
          return { el: link, press: () => window.open(link.href, '_blank') };
        }
      }

      if (sectionOverlay.classList.contains('cakes-modal') && sectionOverlay.classList.contains('expanding')) {
        const centerCake = document.querySelector('.cakes-center:has(img)');
        if (centerCake) {
          const r = centerCake.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dist = Math.hypot(ballCx - cx, ballCy - cy);
          if (dist < Math.max(r.width, r.height) / 2 + ballSize / 2) {
            const imgSrc = centerCake.querySelector('img')?.src;
            const spawnFalling = sectionOverlay._cakesSpawnFalling;
            if (imgSrc && spawnFalling) {
              return { el: centerCake, press: () => spawnFalling(imgSrc) };
            }
          }
        }
        const orbitItems = document.querySelectorAll('.cakes-orbit-item');
        for (const el of orbitItems) {
          const r = el.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dist = Math.hypot(ballCx - cx, ballCy - cy);
          if (dist < r.width / 2 + ballSize / 2) {
            const cakesSelect = sectionOverlay._cakesSelect;
            if (cakesSelect) {
              return { el, press: () => cakesSelect(parseInt(el.dataset.idx, 10)) };
            }
          }
        }
      }

      return null;
    }

    /* ---------- Shooting balls ---------- */
    const gunSound = document.getElementById('soundGun');

    function shootBall(startX, startY) {
      if (gunSound && !siteMuted) {
        gunSound.volume = UI_VOLUME;
        gunSound.currentTime = 0;
        gunSound.play().catch(() => {});
      }
      const flash = document.createElement('div');
      flash.className = 'muzzle-flash';
      flash.style.left = startX + 'px';
      flash.style.top = startY + 'px';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 200);

      const ball = document.createElement('div');
      ball.className = 'ball';
      ball.innerHTML = '<img src="ball.png" alt="">';
      document.body.appendChild(ball);

      const fireAngle = shootAngle + (Math.random() - 0.5) * 0.08;
      const speed = 35 + Math.random() * 8;
      const ballSize = 24;
      let bx = startX - ballSize / 2;
      let by = startY - ballSize / 2;
      let vx = Math.cos(fireAngle) * speed;
      let vy = Math.sin(fireAngle) * speed;
      const gravity = 0.02;
      let life = 0;

      function animate() {
        vx *= 0.999;
        vy += gravity;
        bx += vx;
        by += vy;
        life++;

        ball.style.left = bx + 'px';
        ball.style.top = by + 'px';
        ball.style.transform = `rotate(${life * 8}deg)`;
        ball.style.opacity = Math.max(0, 1 - life / 140);

        const hit = checkAllCollisions(bx, by, ballSize);
        if (hit) {
          hit.el.classList.remove('hit');
          void hit.el.offsetWidth;
          hit.el.classList.add('hit');
          hit.press();
          ball.remove();
          return;
        }

        if (life < 140 && by < window.innerHeight + 60 && by > -200
            && bx > -60 && bx < window.innerWidth + 60) {
          requestAnimationFrame(animate);
        } else {
          ball.remove();
        }
      }
      requestAnimationFrame(animate);
    }

    document.body.addEventListener('click', (e) => {
      if (draggingHot || draggingVec) return;
      if (e.target.closest('.preview-box') || e.target.closest('.ring-btn') || e.target.closest('.exit-btn') || e.target.closest('.mute-btn')) return;
      shootBall(e.clientX, e.clientY);
    });

    const laserLine = document.getElementById('laserLine');
    const laserDot = document.getElementById('laserDot');
    let mouseX = 0, mouseY = 0;

    function getCollidables() {
      const els = [];
      document.querySelectorAll('.ring-btn').forEach(el => els.push(el));
      if (exitBtn.classList.contains('visible')) els.push(exitBtn);
      els.push(frameBtn);
      els.push(couchBtn);
      document.querySelectorAll('.social-icons a').forEach(el => els.push(el));
      if (sectionOverlay.classList.contains('cakes-modal') && sectionOverlay.classList.contains('expanding')) {
        document.querySelectorAll('.cakes-orbit-item, .cakes-center').forEach(el => els.push(el));
      }
      if (sectionOverlay.classList.contains('paintings-modal') && sectionOverlay.classList.contains('expanding')) {
        document.querySelectorAll('.paintings-modal .gallery-item').forEach(el => els.push(el));
      }
      if (sectionOverlay.classList.contains('tattoos-modal') && sectionOverlay.classList.contains('expanding')) {
        document.querySelectorAll('.tattoos-modal .gallery-item').forEach(el => els.push(el));
      }
      return els;
    }

    function getElementUnderPoint(px, py) {
      for (const el of getCollidables()) {
        const r = el.getBoundingClientRect();
        if (r.width === 0) continue;
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const radius = Math.max(r.width, r.height) / 2;
        if (Math.hypot(px - cx, py - cy) <= radius) return el;
      }
      return null;
    }

    function raycastLaser(ox, oy, angle) {
      const under = getElementUnderPoint(ox, oy);
      if (under) return { dist: 0, el: under };

      const dx = Math.cos(angle);
      const dy = Math.sin(angle);
      const maxLen = Math.max(window.innerWidth, window.innerHeight) * 2;
      let closest = maxLen;
      let hitEl = null;

      for (const el of getCollidables()) {
        const r = el.getBoundingClientRect();
        if (r.width === 0) continue;
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const radius = Math.max(r.width, r.height) / 2;

        const fx = ox - cx;
        const fy = oy - cy;
        const a = dx * dx + dy * dy;
        const b = 2 * (fx * dx + fy * dy);
        const c = fx * fx + fy * fy - radius * radius;
        let disc = b * b - 4 * a * c;
        if (disc < 0) continue;
        disc = Math.sqrt(disc);
        const t = (-b - disc) / (2 * a);
        if (t > 5 && t < closest) {
          closest = t;
          hitEl = el;
        }
      }
      return { dist: closest, el: hitEl };
    }

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    (function shakeToGrayscale() {
      const SHAKE_WINDOW_MS = 250;
      const SHAKE_DIR_CHANGES = 3;
      const SHAKE_DURATION_MS = 1000;
      const MIN_DELTA = 2;
      const buffer = [];
      let shakeStartTime = null;
      let grayscaleApplied = false;

      function isShaking() {
        const now = performance.now();
        const cutoff = now - SHAKE_WINDOW_MS;
        const recent = buffer.filter(p => p.t >= cutoff);
        if (recent.length < 3) return false;
        let dirChanges = 0;
        for (let i = 1; i < recent.length - 1; i++) {
          const dx1 = recent[i].x - recent[i - 1].x;
          const dx2 = recent[i + 1].x - recent[i].x;
          const dy1 = recent[i].y - recent[i - 1].y;
          const dy2 = recent[i + 1].y - recent[i].y;
          if (Math.abs(dx1) >= MIN_DELTA && Math.abs(dx2) >= MIN_DELTA && (dx1 > 0) !== (dx2 > 0)) dirChanges++;
          if (Math.abs(dy1) >= MIN_DELTA && Math.abs(dy2) >= MIN_DELTA && (dy1 > 0) !== (dy2 > 0)) dirChanges++;
        }
        return dirChanges >= SHAKE_DIR_CHANGES;
      }

      document.addEventListener('mousemove', (e) => {
        if (grayscaleApplied) return;
        const now = performance.now();
        buffer.push({ x: e.clientX, y: e.clientY, t: now });
        while (buffer.length > 0 && buffer[0].t < now - 400) buffer.shift();

        if (isShaking()) {
          if (shakeStartTime == null) shakeStartTime = now;
          else if (now - shakeStartTime >= SHAKE_DURATION_MS) {
            document.body.classList.add('grayscale-mode');
            grayscaleApplied = true;
          }
        } else {
          shakeStartTime = null;
        }
      });
    })();

    let laserHoverEl = null;
    (function animateLaser() {
      const inTattoosGallery = sectionOverlay.classList.contains('tattoos-modal') && sectionOverlay.classList.contains('expanding');
      if (inTattoosGallery) {
        laserLine.setAttribute('opacity', '0');
        laserDot.setAttribute('opacity', '0');
        if (laserHoverEl) {
          laserHoverEl.classList.remove('laser-hover');
          laserHoverEl = null;
        }
      } else {
        const { dist, el } = raycastLaser(mouseX, mouseY, shootAngle);
        const x2 = mouseX + Math.cos(shootAngle) * dist;
        const y2 = mouseY + Math.sin(shootAngle) * dist;
        laserLine.setAttribute('x1', mouseX);
        laserLine.setAttribute('y1', mouseY);
        laserLine.setAttribute('x2', x2);
        laserLine.setAttribute('y2', y2);

        laserDot.setAttribute('cx', x2);
        laserDot.setAttribute('cy', y2);

        const pulse = 0.35 + Math.sin(performance.now() * 0.008) * 0.15
                           + Math.sin(performance.now() * 0.023) * 0.1;
        laserLine.setAttribute('opacity', pulse);
        laserDot.setAttribute('opacity', pulse + 0.25);

        if (el !== laserHoverEl) {
          if (laserHoverEl) laserHoverEl.classList.remove('laser-hover');
          laserHoverEl = el;
          if (el) el.classList.add('laser-hover');
        }
      }

      requestAnimationFrame(animateLaser);
    })();

    if (!tmpImg.complete) {
      applyCursor(hotX, hotY);
      updatePreview();
    }
  </script>

</body>
