<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oye Estupida</title>
  <link rel="icon" type="image/png" href="img/favico.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { corePlugins: { ringWidth: false, ringColor: false, ringOpacity: false, ringOffsetWidth: false } }</script>
  <style id="gunCursorStyle"></style>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    *:focus { outline: none; }

    body { background: #000; overflow: hidden; }

    body.hide-native-cursor {
      cursor: none !important;
    }

    body.hide-native-cursor *:not(.hotspot-dot):not(.vector-dot) {
      cursor: none !important;
    }

    #gunCursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate3d(0,0,0);
    }
    #gunCursor img {
      display: block;
      width: 64px;
      height: 64px;
      transform-origin: 0 0;
      image-rendering: auto;
    }

    .site-logo {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: none;
      width: 100px;
      max-width: 100px;
    }

    .site-logo img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    body.grayscale-mode {
      filter: grayscale(100%);
      transition: filter 0.6s ease;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: url('mouse.png') 0 0, auto;
      background-image: url('img/bg1.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      transition: background-image 0.6s ease;
    }

    body.night-mode {
      background-image: url('img/bg_night.png');
    }

    /* ---------- Ring ---------- */
    .ring {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 360px;
      height: 360px;
      z-index: 20;
      transition: opacity 0.4s, transform 0.4s;
    }

    .ring.hidden {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.6);
      pointer-events: none;
    }

    .ring-btn {
      position: absolute;
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid #ff00c0;
      background: rgba(255, 105, 180, 0.1);
      color: #ff00c0;
      font-family: 'Courier New', monospace;
      font-size: 10px; font-weight: bold;
      text-align: center;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s ease, opacity 0.4s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ring-btn.dragging {
      transition: none !important;
    }

    .ring-btn .tarot-button-label,
    .ring-btn .mini-btn-label,
    .ring-btn .contact-button-label {
      display: none;
    }

    .ring-btn-tooltip {
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%) translateY(4px) scale(0.85);
      white-space: nowrap;
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      padding: 10px 22px;
      border-radius: 0;
      background: #ff00c0;
      color: #000;
      font-weight: bold;
      box-shadow: 0 0 14px rgba(255,0,192,0.7), 0 0 28px rgba(255,0,192,0.3);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 1;
      clip-path: polygon(
        50% 0%, 56% 14%, 65% 4%, 67% 19%, 79% 11%, 77% 26%,
        93% 22%, 87% 36%, 100% 37%, 90% 50%, 100% 63%, 87% 64%,
        93% 78%, 77% 74%, 79% 89%, 67% 81%, 65% 96%, 56% 86%,
        50% 100%, 44% 86%, 35% 96%, 33% 81%, 21% 89%, 23% 74%,
        7% 78%, 13% 64%, 0% 63%, 10% 50%, 0% 37%, 13% 36%,
        7% 22%, 23% 26%, 21% 11%, 33% 19%, 35% 4%, 44% 14%
      );
    }
    .ring-btn:hover .ring-btn-tooltip,
    .ring-btn.laser-hover .ring-btn-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .frame-tooltip {
      position: fixed;
      transform: translateX(-50%) translateY(4px) scale(0.85);
      white-space: nowrap;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      padding: 10px 22px;
      border-radius: 0;
      background: #ff00c0;
      color: #000;
      box-shadow: 0 0 14px rgba(255,0,192,0.7), 0 0 28px rgba(255,0,192,0.3);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 40;
      clip-path: polygon(
        50% 0%, 56% 14%, 65% 4%, 67% 19%, 79% 11%, 77% 26%,
        93% 22%, 87% 36%, 100% 37%, 90% 50%, 100% 63%, 87% 64%,
        93% 78%, 77% 74%, 79% 89%, 67% 81%, 65% 96%, 56% 86%,
        50% 100%, 44% 86%, 35% 96%, 33% 81%, 21% 89%, 23% 74%,
        7% 78%, 13% 64%, 0% 63%, 10% 50%, 0% 37%, 13% 36%,
        7% 22%, 23% 26%, 21% 11%, 33% 19%, 35% 4%, 44% 14%
      );
    }
    .frame-tooltip.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .couch-tooltip {
      position: fixed;
      transform: translateX(-50%) translateY(4px) scale(0.85);
      white-space: nowrap;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0;
      padding: 10px 22px;
      border-radius: 0;
      background: #ff00c0;
      color: #000;
      box-shadow: 0 0 14px rgba(255,0,192,0.7), 0 0 28px rgba(255,0,192,0.3);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 40;
      clip-path: polygon(
        50% 0%, 56% 14%, 65% 4%, 67% 19%, 79% 11%, 77% 26%,
        93% 22%, 87% 36%, 100% 37%, 90% 50%, 100% 63%, 87% 64%,
        93% 78%, 77% 74%, 79% 89%, 67% 81%, 65% 96%, 56% 86%,
        50% 100%, 44% 86%, 35% 96%, 33% 81%, 21% 89%, 23% 74%,
        7% 78%, 13% 64%, 0% 63%, 10% 50%, 0% 37%, 13% 36%,
        7% 22%, 23% 26%, 21% 11%, 33% 19%, 35% 4%, 44% 14%
      );
    }
    .couch-tooltip.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    /* Center-right fixed image (e.g. toggle/branding) */
    .center-right-img {
      width: 72px;
      height: auto;
      cursor: inherit;
      filter: none;
    }

    @media (max-width: 640px) {
      #laserSvg {
        display: none;
      }
    }

    @media (hover: none), (pointer: coarse) {
      #laserSvg {
        display: none;
      }
    }

    /* Tarot tooltip: nudge slightly up */
    .ring-btn.tarot-btn .ring-btn-tooltip {
      bottom: auto;
      top: calc(100% + 10px);
    }

    /* CAKES button tooltip: lift a bit */
    .ring-btn.cakes-btn .ring-btn-tooltip {
      top: auto;
      bottom: calc(100% + 14px);
      left: 0;
      transform: translateX(-100%) translateY(-10px) scale(0.9);
    }

    .ring-btn.cakes-btn:hover .ring-btn-tooltip,
    .ring-btn.cakes-btn.laser-hover .ring-btn-tooltip {
      transform: translateX(-100%) translateY(0) scale(1);
    }

    /* CONTACT button tooltip: nudge up */
    .ring-btn.contact-btn .ring-btn-tooltip {
      bottom: calc(120% + 30px);
    }

    /* TATTOOS button tooltip: lift a bit */
    .ring-btn.tattoos-btn .ring-btn-tooltip {
      bottom: calc(120% + 20px);
    }

    /* STURM button is huge → lift tooltip more */
    .ring-btn.sturm-btn .ring-btn-tooltip {
      bottom: calc(120% + 60px);
    }

    .ring-btn:hover,
    .ring-btn.laser-hover {
      background: #ff00c0;
      color: #000;
      box-shadow: 0 0 20px rgba(255,0,192,0.6), 0 0 40px rgba(255,0,192,0.3);
      transform: scale(1.15);
    }

    .ring-btn:active {
      transform: scale(0.95);
      background: #ff00c0;
    }

    .ring-btn.selected {
      background: #ff00c0;
      color: #000;
      box-shadow: 0 0 14px rgba(255,0,192,0.5);
    }

    .ring-btn.hit {
      animation: btnHit 0.4s ease-out;
    }

    .ring-btn.vibrate-once {
      animation: ringVibrate 0.18s linear 0s 2;
    }

    @keyframes ringVibrate {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-2px); }
      50%  { transform: translateX(2px); }
      75%  { transform: translateX(-1px); }
      100% { transform: translateX(0); }
    }

    .ring-btn.tarot-btn {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      overflow: visible;
    }

    .ring-btn.tarot-btn:hover {
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .ring-btn.contact-btn {
      width: 80px;
      height: 56px;
      border-radius: 12px;
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .ring-btn.tattoos-btn,
    .ring-btn.cakes-btn,
    .ring-btn.sturm-btn {
      width: 80px;
      height: 56px;
      border-radius: 12px;
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .ring-btn.contact-btn:hover {
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .ring-btn.tattoos-btn:hover,
    .ring-btn.cakes-btn:hover,
    .ring-btn.sturm-btn:hover {
      background: transparent;
      border-color: transparent;
      box-shadow: none !important;
      transform: none;
      color: inherit;
    }

    .ring-btn.tattoos-btn {
      z-index: 3000 !important;
    }

    .ring-btn.tarot-btn {
      z-index: 3000 !important;
    }

    .ring-btn.sturm-btn {
      z-index: 3000 !important;
    }

    .ring-btn.contact-btn {
      z-index: 3000 !important;
    }

    .ring-btn.cakes-btn {
      z-index: 3000 !important;
    }

    /* STURMZX2 & TATTOOS buttons: never show pink selected/hover glow */
    .ring-btn.sturm-btn,
    .ring-btn.sturm-btn:hover,
    .ring-btn.sturm-btn.selected,
    .ring-btn.sturm-btn.hit,
    .ring-btn.tattoos-btn,
    .ring-btn.tattoos-btn:hover,
    .ring-btn.tattoos-btn.selected,
    .ring-btn.tattoos-btn.hit {
      background: transparent !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }

    .ring-btn.contact-btn,
    .ring-btn.contact-btn:hover,
    .ring-btn.contact-btn.laser-hover,
    .ring-btn.contact-btn.selected,
    .ring-btn.contact-btn.hit,
    .ring-btn.tarot-btn,
    .ring-btn.tarot-btn:hover,
    .ring-btn.tarot-btn.laser-hover,
    .ring-btn.tarot-btn.selected,
    .ring-btn.tarot-btn.hit {
      background: transparent !important;
      border-color: transparent !important;
      box-shadow: none !important;
      color: inherit !important;
    }

    .tarot-button-cards {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
      z-index: 2;
    }

    .tarot-button-card {
      position: absolute;
      width: 28px;
      height: 48px;
      border-radius: 4px;
      overflow: hidden;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      box-shadow: none;
      filter: hue-rotate(-20deg) saturate(1.6);
      transition: transform 0.3s ease, opacity 0.3s ease;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1.6);
    }

    /* Resting = spread (old hover position) */
    .ring-btn.tarot-btn .tarot-button-card.c1 {
      transform: translate(-90%, -30%) rotate(-18deg) scale(2);
    }
    .ring-btn.tarot-btn .tarot-button-card.c2 {
      transform: translate(-50%, -60%) rotate(-6deg) scale(2);
    }
    .ring-btn.tarot-btn .tarot-button-card.c3 {
      transform: translate(-10%, -60%) rotate(6deg) scale(2);
    }
    .ring-btn.tarot-btn .tarot-button-card.c4 {
      transform: translate(30%, -30%) rotate(18deg) scale(2);
    }

    .tarot-button-card.c1 { background-image: url('img/tarot/tarot4.png'); z-index: 1; }
    .tarot-button-card.c2 { background-image: url('img/tarot/tarot3.png'); z-index: 2; }
    .tarot-button-card.c3 { background-image: url('img/tarot/tarot2.png'); z-index: 3; }
    .tarot-button-card.c4 { background-image: url('img/tarot/tarot1.png'); z-index: 4; }

    .tarot-button-label {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff00c0;
      font-family: 'Courier New', monospace;
      pointer-events: none;
      z-index: 2;
    }

    .contact-button-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .contact-button-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .contact-button-icon svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #ff00c0;
      stroke-width: 2.5;
    }

    .contact-button-label {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff00c0;
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }

    .mini-btn-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .mini-btn-label {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff00c0;
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }

    .mini-btn-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 140px;
      height: 140px;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mini-btn-icon svg {
      width: 34px;
      height: 34px;
      fill: none;
      stroke: #ff00c0;
      stroke-width: 2.3;
    }

    .ring-btn.tarot-btn:hover .tarot-button-card.c1 {
      transform: translate(-120%, -20%) rotate(-28deg) scale(2.5);
    }

    .ring-btn.tarot-btn:hover .tarot-button-card.c2 {
      transform: translate(-55%, -80%) rotate(-9deg) scale(2.5);
    }

    .ring-btn.tarot-btn:hover .tarot-button-card.c3 {
      transform: translate(10%, -80%) rotate(9deg) scale(2.5);
    }

    .ring-btn.tarot-btn:hover .tarot-button-card.c4 {
      transform: translate(55%, -20%) rotate(28deg) scale(2.5);
    }

    @keyframes btnHit {
      0%   { transform: scale(1.3); box-shadow: 0 0 20px rgba(255,0,192,0.6); }
      50%  { transform: scale(0.85); }
      100% { transform: scale(1); }
    }

    .frame-btn {
      pointer-events: auto !important;
      transform-origin: top center;
      transition: filter 0.2s, width 0.4s ease, max-width 0.4s ease;
    }

    .frame-btn.dragging {
      transition: none !important;
    }

    #frameArt.dragging {
      transition: none !important;
    }

    #frameArt {
      object-fit: contain;
      border-radius: 0;
      clip-path: none;
      opacity: 1;
      transition: opacity 0.5s ease, width 0.4s ease, max-width 0.4s ease;
    }

    #frameArt.fading {
      opacity: 0;
    }

    .frame-btn.laser-hover {
      filter: brightness(1.25);
    }

    .frame-btn.hit {
      animation: frameHit 0.4s ease-out;
    }

    #frameArt {
      object-fit: contain;
      border-radius: 0;
      clip-path: none;
      opacity: 1;
      transition: opacity 0.5s ease, width 0.4s ease, max-width 0.4s ease;
    }

    @keyframes frameHit {
      0%   { filter: brightness(1.8); }
      100% { filter: brightness(1); }
    }

    /* ---------- Cakes order button & form ---------- */
    .cakes-order-btn {
      position: fixed;
      right: 20px;
      bottom: 24px;
      z-index: 1200;
      padding: 6px 12px;
      border-radius: 999px;
      border: 0;
      background: #ff00c0;
      color: #000;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      box-shadow: none;
      transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    .cakes-order-btn.visible {
      display: inline-flex;
    }
    .cakes-order-btn:hover,
    .cakes-order-btn.laser-hover {
      transform: translateY(-2px);
      box-shadow: none;
      filter: brightness(1.05);
    }

    .cakes-order-form-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 0, 10, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1300;
    }
    .cakes-order-form-overlay.visible {
      display: flex;
    }
    .cakes-order-form {
      width: min(420px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px 22px;
      border-radius: 18px;
      border: 1px solid #ff00c0;
      background: radial-gradient(circle at top, rgba(255,0,192,0.15), transparent 60%), rgba(10, 0, 20, 0.96);
      box-shadow: 0 0 30px rgba(255,0,192,0.7);
      font-family: 'Courier New', monospace;
      color: #fdf0ff;
    }
    .cakes-order-form h3 {
      margin: 0 0 14px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #ff00c0;
      text-align: center;
    }
    .cakes-order-form p {
      font-size: 11px;
      line-height: 1.5;
      margin: 0 0 14px;
      color: #ffbdf1;
      text-align: center;
    }
    .cakes-order-form label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 10px 0 4px;
      color: #ffdaf7;
    }
    .cakes-order-step {
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .cakes-order-step.active {
      display: flex;
    }
    .cakes-order-form input[type="text"],
    .cakes-order-form input[type="date"],
    .cakes-order-form textarea,
    .cakes-order-form select {
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(255,0,192,0.4);
      background: rgba(10,0,20,0.9);
      color: #fff;
      padding: 7px 9px;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .cakes-order-form textarea {
      min-height: 70px;
      resize: vertical;
    }
    .cakes-order-form small {
      display: block;
      font-size: 9px;
      color: #ff9eea;
      margin-top: 2px;
    }
    .cakes-order-form .colors-row {
      display: flex;
      gap: 6px;
    }
    .cakes-order-form .colors-row input[type="color"] {
      width: 100%;
      height: 44px;
      flex: 1 1 0;
      padding: 0;
      border-radius: 10px;
      border: 1px solid rgba(255,0,192,0.4);
      background: rgba(10,0,20,0.9);
      cursor: pointer;
    }
    .cakes-order-actions {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .cakes-order-submit {
      flex: 1;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #ff00c0;
      background: #ff00c0;
      color: #000;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      cursor: pointer;
    }
    .cakes-order-submit:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 20px rgba(255,0,192,0.8);
    }
    .cakes-order-cancel {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: #fff;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      white-space: nowrap;
    }
    .cakes-order-cancel:hover {
      background: rgba(255,255,255,0.08);
    }

    .couch-kiss {
      position: fixed;
      font-size: 42px;
      line-height: 1;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: none;
      transform: translate(-50%, -50%);
    }
    .couch-kiss.animate {
      animation: kissRise 1.2s ease-out forwards;
    }
    @keyframes kissRise {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.6);
      }
      25% {
        opacity: 1;

    // Recolor favicon to pink while preserving transparency
    (function tintFaviconToPink() {
      const link = document.querySelector("link[rel='icon']");
      if (!link || !link.href) return;
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        ctx.drawImage(img, 0, 0);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const pink = { r: 255, g: 105, b: 180 };
        for (let i = 0; i < data.length; i += 4) {
          const a = data[i + 3];
          if (a === 0) continue;
          const gray = (data[i] + data[i + 1] + data[i + 2]) / (3 * 255);
          data[i]     = pink.r * gray;
          data[i + 1] = pink.g * gray;
          data[i + 2] = pink.b * gray;
        }
        ctx.putImageData(imgData, 0, 0);
        link.href = canvas.toDataURL('image/png');
      };
      img.src = link.href;
    })();

    /* ---------- Day / Night background ---------- */
    (function() {
      const NIGHT_HOUR = 20; // 20hs = 8pm
      const STORAGE_KEY = 'bgTheme';
      const switchEl = document.getElementById('dayNightSwitch');
      const toggleEl = switchEl ? switchEl.querySelector('.daynight-toggle') : null;

      function applyTheme(theme) {
        if (theme === 'night') {
          document.body.classList.add('night-mode');
          if (switchEl) switchEl.classList.add('night');
        } else {
          document.body.classList.remove('night-mode');
          if (switchEl) switchEl.classList.remove('night');
        }
      }

      let theme = localStorage.getItem(STORAGE_KEY);
      if (!theme) {
        const now = new Date();
        const hour = now.getHours();
        theme = hour >= NIGHT_HOUR ? 'night' : 'day';
      }
      applyTheme(theme);

      if (switchEl && toggleEl) {
        switchEl.addEventListener('click', (e) => {
          e.stopPropagation();
          theme = theme === 'night' ? 'day' : 'night';
          localStorage.setItem(STORAGE_KEY, theme);
          applyTheme(theme);

    })();

    const previewImg = document.getElementById('previewImg');

    const saveBtn = document.getElementById('saveBtn');
    const cakesOrderBtn = document.getElementById('cakesOrderBtn');
    const cakesOrderOverlay = document.getElementById('cakesOrderOverlay');
    const cakesOrderForm = document.getElementById('cakesOrderForm');
    const cakesOrderCancel = document.getElementById('cakesOrderCancel');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const sectionOverlay = document.getElementById('sectionOverlay');
    const sectionContent = document.getElementById('sectionContent');
    const exitBtn = document.getElementById('exitBtn');

    let imgW = 32, imgH = 32;
    let hotX = 0.974, hotY = 0.459;
    let shootAngle = 0.229;
    const ARROW_LEN = 60;
    let sectionOpen = false;
    // Prevent firing the gun immediately after dragging UI elements
    let isDraggingUI = false;
    let lastDragEnd = 0;

    const tmpImg = new Image();
    tmpImg.onload = () => {
      imgW = tmpImg.naturalWidth;
      imgH = tmpImg.naturalHeight;
      const saved = localStorage.getItem('gunConfig');
      if (saved) {
        try {
          const s = JSON.parse(saved);
          if (s && typeof s.hotX === 'number' && typeof s.hotY === 'number' && typeof s.angle === 'number') {
            hotX = s.hotX;
            hotY = s.hotY;
            shootAngle = s.angle;
            saveBtn.textContent = 'saved \u2713';
            saveBtn.classList.add('saved');
            document.getElementById('preview').classList.add('folded');
          }
        } catch (e) { /* ignore corrupt saved config */ }
      }
      applyCursor(hotX, hotY);
      updatePreview();
      requestAnimationFrame(() => { applyCursor(hotX, hotY); updatePreview(); });
    };
    tmpImg.src = 'mouse.png';

    function getImgRect() {
      const rect = previewImg.getBoundingClientRect();
      const cRect = previewContainer.getBoundingClientRect();
      return {
        offX: rect.left - cRect.left,
        offY: rect.top - cRect.top,
        w: rect.width,
        h: rect.height
      };
    }

    const gunCursorStyle = document.getElementById('gunCursorStyle');
    let normalCursorRule = '';
    let flippedCursorRule = '';
    const gunCursorEl = document.getElementById('gunCursor');
    const gunCursorImgEl = gunCursorEl ? gunCursorEl.querySelector('img') : null;
    let cursorHX = 0;
    let cursorHY = 0;
    let cursorW = 64;
    let cursorH = 64;
    let cursorEnabled = true;
    window.addEventListener('pointerdown', (e) => {
      if (e && e.pointerType === 'touch') {
        cursorEnabled = false;
        console.log('[gunCursor] disabled via pointerdown touch');
      }
    }, { passive: true });

    function applyCursor(xRatio, yRatio) {
      hotX = Math.max(0, Math.min(1, xRatio));
      hotY = Math.max(0, Math.min(1, yRatio));
      const maxW = Math.min(imgW, 128);
      const maxH = Math.min(imgH, 128);
      const hx = Math.round(hotX * (maxW - 1));
      const hy = Math.round(hotY * (maxH - 1));

      normalCursorRule = `url('mouse.png') ${hx} ${hy}, auto`;

      // Cross-browser stability: avoid data-URL flipped cursors (can fail and fall back to arrow)
      flippedCursorRule = normalCursorRule;

      cursorHX = hx;
      cursorHY = hy;
      cursorW = maxW;
      cursorH = maxH;
      if (gunCursorEl) {
        gunCursorEl.style.width = cursorW + 'px';
        gunCursorEl.style.height = cursorH + 'px';
      }
      if (gunCursorImgEl) {
        gunCursorImgEl.style.width = cursorW + 'px';
        gunCursorImgEl.style.height = cursorH + 'px';
        gunCursorImgEl.style.transformOrigin = (cursorW / 2) + 'px 0';
      }

      document.body.style.cursor = normalCursorRule;
      document.querySelectorAll('.ring-btn, .exit-btn, .mute-btn, .frame-btn, .social-icons a, .tarot-contact-btn, .gallery-item, .cakes-orbit-item, .cakes-center').forEach(b => b.style.cursor = normalCursorRule);
      updateCursorSide();
      hotspotDot.style.cursor = 'grab';
    }

    function updateCursorSide() {
      if (!normalCursorRule) return;
      gunCursorStyle.textContent = '';
    }

    function updateGunCursor(targetEl) {
      if (!gunCursorEl || !gunCursorImgEl) return;
      const isFormField = !!(targetEl && targetEl.closest && targetEl.closest('input, textarea, select, [contenteditable="true"]'));
      if (!cursorEnabled || isFormField) {
        gunCursorEl.style.display = 'none';
        document.body.classList.remove('hide-native-cursor');
        return;
      }

      const flipped = mouseX > window.innerWidth / 2;
      if (flipped) {
        document.body.classList.add('hide-native-cursor');
        gunCursorEl.style.left = (mouseX - (cursorW - cursorHX)) + 'px';
        gunCursorEl.style.top = (mouseY - cursorHY) + 'px';
        gunCursorImgEl.style.transform = 'scaleX(-1)';
        gunCursorEl.style.display = 'block';
      } else {
        document.body.classList.remove('hide-native-cursor');
        gunCursorEl.style.display = 'none';
      }
    }

    const valHotX  = document.getElementById('valHotX');
    const valHotY  = document.getElementById('valHotY');
    const valAngle = document.getElementById('valAngle');

    function updatePreview() {
      const r = getImgRect();
      const hpx = r.offX + hotX * r.w;
      const hpy = r.offY + hotY * r.h;
      hotspotDot.style.left = hpx + 'px';
      hotspotDot.style.top  = hpy + 'px';
      const vEndX = hpx + Math.cos(shootAngle) * ARROW_LEN;
      const vEndY = hpy + Math.sin(shootAngle) * ARROW_LEN;
      vectorDot.style.left = vEndX + 'px';
      vectorDot.style.top  = vEndY + 'px';
      vectorLine.setAttribute('x1', hpx);
      vectorLine.setAttribute('y1', hpy);
      vectorLine.setAttribute('x2', vEndX);
      vectorLine.setAttribute('y2', vEndY);
      // Live readout
      valHotX.textContent  = hotX.toFixed(3);
      valHotY.textContent  = hotY.toFixed(3);
      valAngle.textContent = shootAngle.toFixed(3);
    }

    /* ---------- Dragging ---------- */
    let draggingHot = false;
    let draggingVec = false;

    hotspotDot.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      draggingHot = true;
      hotspotDot.classList.add('dragging');
    });

    vectorDot.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      draggingVec = true;
      vectorDot.classList.add('dragging');
    });

    window.addEventListener('mousemove', (e) => {
      if (draggingHot) {
        const rect = previewImg.getBoundingClientRect();
        applyCursor(
          (e.clientX - rect.left) / rect.width,
          (e.clientY - rect.top) / rect.height
        );
        updatePreview();
        markUnsaved();
      }
      if (draggingVec) {
        const r = getImgRect();
        const cRect = previewContainer.getBoundingClientRect();
        shootAngle = Math.atan2(
          (e.clientY - cRect.top) - (r.offY + hotY * r.h),
          (e.clientX - cRect.left) - (r.offX + hotX * r.w)
        );
        updatePreview();
        markUnsaved();
      }
    });

    window.addEventListener('mouseup', () => {
      if (draggingHot) { draggingHot = false; hotspotDot.classList.remove('dragging'); }
      if (draggingVec) { draggingVec = false; vectorDot.classList.remove('dragging'); }
    });

    function markUnsaved() {
      saveBtn.textContent = 'save config';
      saveBtn.classList.remove('saved');
    }

    const previewBox = document.getElementById('preview');

    saveBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      localStorage.setItem('gunConfig', JSON.stringify({ hotX, hotY, angle: shootAngle }));
      saveBtn.textContent = 'saved \u2713';
      saveBtn.classList.add('saved');
      setTimeout(() => previewBox.classList.add('folded'), 400);
    });

    previewBox.addEventListener('click', (e) => {
      if (previewBox.classList.contains('folded')) {
        e.stopPropagation();
        previewBox.classList.remove('folded');
        requestAnimationFrame(() => updatePreview());
      }

    /* ---------- 5 Sections ---------- */
    const sectionNames = ['Paintings', 'STURMZX2', 'CAKES', 'BIO', 'TAROT', 'Tattoos', 'Contact'];

    const ringButtons = [];

    const ringSounds = {
      Tattoos: document.getElementById('soundTattoos'),

      TAROT: document.getElementById('soundTarot'),

      CAKES: document.getElementById('soundCakes'),

    const soundFrame = document.getElementById('soundFrame');
    const soundCouch = document.getElementById('soundCouch');
    const soundSocial1 = document.getElementById('soundSocial1');
    const soundSocial2 = document.getElementById('soundSocial2');
    const soundSocial3 = document.getElementById('soundSocial3');
    const soundTheme = document.getElementById('soundTheme');

    let siteMuted = JSON.parse(localStorage.getItem('siteMuted') || 'false');
    const UI_VOLUME = 0.2;
    const THEME_VOLUME = 0.22;

    const HOVER_SOUND_COOLDOWN_MS = 3000;
    const lastHoverSoundAt = new WeakMap();

    function updateMuteState() {
      localStorage.setItem('siteMuted', JSON.stringify(siteMuted));
      if (soundTheme) {
        soundTheme.muted = siteMuted;
      }
      const muteBtn = document.getElementById('muteBtn');

        muteBtn.classList.toggle('muted', siteMuted);

        const muteTip = muteBtn.parentElement && muteBtn.parentElement.querySelector('.mute-tooltip');
        if (muteTip) muteTip.textContent = siteMuted ? 'SOUND OFF' : 'SOUND ON';
      }
    }

    function playSoundForElement(el, audio) {
      if (!audio) return;
      if (siteMuted) return;

      // 3s cooldown on rollover for all UI buttons, but NOT for social media icons
      if (el && !el.closest('.social-icons')) {
        const now = Date.now();
        const lastAt = lastHoverSoundAt.get(el) || 0;
        if (now - lastAt < HOVER_SOUND_COOLDOWN_MS) return;
        lastHoverSoundAt.set(el, now);
      }

      audio.volume = UI_VOLUME;
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function startThemeOnce() {
      if (!soundTheme || soundTheme.dataset.started) return;
      soundTheme.dataset.started = '1';
      soundTheme.volume = THEME_VOLUME;
      soundTheme.muted = siteMuted;
      soundTheme.play().catch(() => {});
    }

    function positionLoupe(e, loupe) {
      if (!loupe) return;
      const w = loupe.offsetWidth || 100;
      const h = loupe.offsetHeight || 100;
      const margin = 12;
      const offset = 24;

      const halfW = w / 2;
      const halfH = h / 2;

      // loupe uses transform: translate(-50%, -50%), so left/top are CENTER coords
      let left = e.clientX + offset + halfW;
      if (e.clientX > window.innerWidth / 2) {
        left = e.clientX - offset - halfW;
      }
      left = Math.max(margin + halfW, Math.min(window.innerWidth - halfW - margin, left));

      let top = e.clientY + offset + halfH;
      if (top + halfH + margin > window.innerHeight) {
        top = e.clientY - offset - halfH;
      }
      top = Math.max(margin + halfH, Math.min(window.innerHeight - halfH - margin, top));

      loupe.style.left = left + 'px';
      loupe.style.top = top + 'px';
    }

      e.stopPropagation();
      siteMuted = !siteMuted;

    }

    /* ---------- Instagram icons (Tattoo / Visual Art) ---------- */
    const instagramTattoo = document.getElementById('instagramTattoo');
    const instagramArt = document.getElementById('instagramArt');

    /* ---------- Collision detection ---------- */
    function checkAllCollisions(bx, by, ballSize) {
      const ballCx = bx + ballSize / 2;
      const ballCy = by + ballSize / 2;

      if (exitBtn.classList.contains('visible')) {
        const r = exitBtn.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dist = Math.hypot(ballCx - cx, ballCy - cy);
        if (dist < r.width / 2 + ballSize / 2) {
          return { el: exitBtn, press: closeSection, isExit: true };
        }
      }

      if (!sectionOpen) {
        for (const b of ringButtons) {
          const r = b.el.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dist = Math.hypot(ballCx - cx, ballCy - cy);
          if (dist < r.width / 2 + ballSize / 2) {
            return b;
          }
        }
      }

      const socialLinks = document.querySelectorAll('.social-icons a');
      for (const link of socialLinks) {
        const r = link.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dist = Math.hypot(ballCx - cx, ballCy - cy);
        if (dist < r.width / 2 + ballSize / 2) {
          return { el: link, press: () => window.open(link.href, '_blank') };
        }
      }

      if (sectionOverlay.classList.contains('cakes-modal') && sectionOverlay.classList.contains('expanding')) {
        const centerCake = document.querySelector('.cakes-center:has(img)');
        if (centerCake) {
          const r = centerCake.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dist = Math.hypot(ballCx - cx, ballCy - cy);
          if (dist < Math.max(r.width, r.height) / 2 + ballSize / 2) {
            const imgSrc = centerCake.querySelector('img')?.src;
            const spawnFalling = sectionOverlay._cakesSpawnFalling;
            if (imgSrc && spawnFalling) {
              return { el: centerCake, press: () => spawnFalling(imgSrc) };
            }
          }
        }
        const orbitItems = document.querySelectorAll('.cakes-orbit-item');
        for (const el of orbitItems) {
          const r = el.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dist = Math.hypot(ballCx - cx, ballCy - cy);
          if (dist < r.width / 2 + ballSize / 2) {
            const cakesSelect = sectionOverlay._cakesSelect;
            if (cakesSelect) {
              return { el, press: () => cakesSelect(parseInt(el.dataset.idx, 10)) };
            }
          }
        }
      }

      return null;
    }

    /* ---------- Shooting balls ---------- */
    const gunSound = document.getElementById('soundGun');

    function shootBall(startX, startY) {
      if (gunSound && !siteMuted) {
        gunSound.volume = UI_VOLUME;
        gunSound.currentTime = 0;
        gunSound.play().catch(() => {});
      }
      const flash = document.createElement('div');
      flash.className = 'muzzle-flash';
      flash.style.left = startX + 'px';
      flash.style.top = startY + 'px';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 200);

      const ball = document.createElement('div');
      ball.className = 'ball';
      ball.innerHTML = '<img src="ball.png" alt="">';
      document.body.appendChild(ball);

      const fireAngle = effectiveShootAngle() + (Math.random() - 0.5) * 0.08;
      const speed = 35 + Math.random() * 8;
      const ballSize = 14;
      let bx = startX - ballSize / 2;
      let by = startY - ballSize / 2;
      let vx = Math.cos(fireAngle) * speed;
      let vy = Math.sin(fireAngle) * speed;
      const gravity = 0.35;
      const friction = 0.965;
      const bounce = 0.55;
      let life = 0;
      let ratHitAt = 0; // timestamp of last rat hit for this ball

      function animate() {
        vx *= friction;
        vy *= friction;
        vy += gravity;
        bx += vx;
        by += vy;
        life++;

        // Bounce off screen edges
        if (bx < 0) { bx = 0; vx = Math.abs(vx) * bounce; }
        if (bx + ballSize > window.innerWidth) { bx = window.innerWidth - ballSize; vx = -Math.abs(vx) * bounce; }
        if (by < 0) { by = 0; vy = Math.abs(vy) * bounce; }
        if (by + ballSize > window.innerHeight) { by = window.innerHeight - ballSize; vy = -Math.abs(vy) * bounce; }

        ball.style.left = bx + 'px';
        ball.style.top = by + 'px';
        ball.style.transform = `rotate(${life * 8}deg)`;

        const currentSpeed = Math.sqrt(vx * vx + vy * vy);

        const hit = checkAllCollisions(bx, by, ballSize);
        if (hit) {
          // Visual flash only — no action triggered
          hit.el.classList.remove('hit');
          void hit.el.offsetWidth;
          hit.el.classList.add('hit');
          // Reflect velocity off the element's surface normal
          const r = hit.el.getBoundingClientRect();
          const ecx = r.left + r.width / 2;
          const ecy = r.top + r.height / 2;
          const ballCx = bx + ballSize / 2;
          const ballCy = by + ballSize / 2;
          const nx = ballCx - ecx;
          const ny = ballCy - ecy;
          const len = Math.hypot(nx, ny) || 1;
          const ndx = nx / len;
          const ndy = ny / len;
          const dot = vx * ndx + vy * ndy;
          vx = (vx - 2 * dot * ndx) * bounce;
          vy = (vy - 2 * dot * ndy) * bounce;
          // Push ball out of collision zone so it doesn't re-trigger next frame
          const minDist = Math.max(r.width, r.height) / 2 + ballSize / 2 + 2;
          bx = ecx + ndx * minDist - ballSize / 2;
          by = ecy + ndy * minDist - ballSize / 2;
        }

        // Rat collision — skip while any modal is open
        const ratEl = !sectionOpen ? document.getElementById('site-rat') : null;
        if (ratEl) {
          const rr = ratEl.getBoundingClientRect();
          const now = Date.now();
          if (rr.width > 0 &&
              bx + ballSize > rr.left && bx < rr.right &&
              by + ballSize > rr.top  && by < rr.bottom &&
              now - ratHitAt > 1000) {
            ratHitAt = now;
            // Bounce off rat
            const ecx = rr.left + rr.width / 2;
            const ecy = rr.top  + rr.height / 2;
            const ballCx = bx + ballSize / 2;
            const ballCy = by + ballSize / 2;
            const nx = ballCx - ecx, ny = ballCy - ecy;
            const len = Math.hypot(nx, ny) || 1;
            const ndx = nx / len, ndy = ny / len;
            const dot = vx * ndx + vy * ndy;
            vx = (vx - 2 * dot * ndx) * bounce;
            vy = (vy - 2 * dot * ndy) * bounce;
            bx = ecx + ndx * (rr.width / 2 + ballSize / 2 + 2) - ballSize / 2;
            by = ecy + ndy * (rr.height / 2 + ballSize / 2 + 2) - ballSize / 2;
            // Spawn a single floating "noo" above the rat
            const noo = document.createElement('div');
            noo.className = 'rat-noo visible';
            noo.textContent = 'noo';
            noo.style.left = (rr.left + rr.width / 2) + 'px';
            noo.style.top  = (rr.top - 36) + 'px';
            document.body.appendChild(noo);
            setTimeout(() => noo.classList.remove('visible'), 900);
            setTimeout(() => noo.remove(), 1100);
          }
        }

        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    }

    // Single click — one shot
    document.body.addEventListener('click', (e) => {
      if (draggingHot || draggingVec) return;
      if (isDraggingUI || Date.now() - lastDragEnd < 120) return;
      if (e.target.closest('.preview-box') || e.target.closest('.ring-btn') || e.target.closest('.exit-btn') || e.target.closest('.mute-btn')) return;
      shootBall(e.clientX, e.clientY);
    });

    // Hold — uzi mode
    let uziInterval = null;
    const UZI_RATE_MS = 80; // ~12 shots/sec

    document.body.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (e.target.closest('.preview-box') || e.target.closest('.ring-btn') || e.target.closest('.exit-btn') || e.target.closest('.mute-btn')) return;
      // Only start uzi after holding 200ms so a quick click stays a single shot
      const holdStart = Date.now();
      uziInterval = setTimeout(() => {
        uziInterval = setInterval(() => {
          if (draggingHot || draggingVec || isDraggingUI) return;
          shootBall(mouseX, mouseY);
        }, UZI_RATE_MS);
      }, 200);
    });

    document.body.addEventListener('mouseup', () => {
      clearTimeout(uziInterval);
      clearInterval(uziInterval);
      uziInterval = null;
    });

    document.body.addEventListener('mouseleave', () => {
      clearTimeout(uziInterval);
      clearInterval(uziInterval);
      uziInterval = null;
    });

    const laserLine = document.getElementById('laserLine');
    const laserDot = document.getElementById('laserDot');
    let mouseX = 0, mouseY = 0;
    let laserActive = true;

    function effectiveShootAngle() {
      return mouseX > window.innerWidth / 2 ? Math.PI - shootAngle : shootAngle;
    }

    function getCollidables() {
      const els = [];
      document.querySelectorAll('.ring-btn').forEach(el => els.push(el));
      if (exitBtn.classList.contains('visible')) els.push(exitBtn);
      els.push(frameBtn);
      els.push(couchBtn);
      document.querySelectorAll('.social-icons a').forEach(el => els.push(el));
      if (sectionOverlay.classList.contains('cakes-modal') && sectionOverlay.classList.contains('expanding')) {
        document.querySelectorAll('.cakes-orbit-item, .cakes-center').forEach(el => els.push(el));
      }
      if (sectionOverlay.classList.contains('paintings-modal') && sectionOverlay.classList.contains('expanding')) {
        document.querySelectorAll('.paintings-modal .gallery-item').forEach(el => els.push(el));
      }
      if (sectionOverlay.classList.contains('tattoos-modal') && sectionOverlay.classList.contains('expanding')) {
        document.querySelectorAll('.tattoos-modal .gallery-item').forEach(el => els.push(el));
      }
      return els;
    }

    function getElementUnderPoint(px, py) {
      for (const el of getCollidables()) {
        const r = el.getBoundingClientRect();
        if (r.width === 0) continue;
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const radius = Math.max(r.width, r.height) / 2;
        if (Math.hypot(px - cx, py - cy) <= radius) return el;
      }
      return null;
    }

    function raycastLaser(ox, oy, angle) {
      const under = getElementUnderPoint(ox, oy);
      if (under) return { dist: 0, el: under };

      const dx = Math.cos(angle);
      const dy = Math.sin(angle);
      const maxLen = Math.max(window.innerWidth, window.innerHeight) * 2;
      let closest = maxLen;
      let hitEl = null;

      for (const el of getCollidables()) {
        const r = el.getBoundingClientRect();
        if (r.width === 0) continue;
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const radius = Math.max(r.width, r.height) / 2;

        const fx = ox - cx;
        const fy = oy - cy;
        const a = dx * dx + dy * dy;
        const b = 2 * (fx * dx + fy * dy);
        const c = fx * fx + fy * fy - radius * radius;
        let disc = b * b - 4 * a * c;
        if (disc < 0) continue;
        disc = Math.sqrt(disc);
        const t = (-b - disc) / (2 * a);
        if (t > 5 && t < closest) {
          closest = t;
          hitEl = el;
        }
      }
      return { dist: closest, el: hitEl };
    }

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      laserActive = true;
      updateCursorSide();
      updateGunCursor(e.target);
    });

    window.addEventListener('mouseenter', () => {
      updateGunCursor(null);
    });

    document.addEventListener('mouseleave', () => {
      laserActive = false;
      if (laserLine) laserLine.setAttribute('opacity', '0');
      if (laserDot) laserDot.setAttribute('opacity', '0');
      if (laserHoverEl) {
        laserHoverEl.classList.remove('laser-hover');
        laserHoverEl = null;
      }
    });

    window.addEventListener('blur', () => {
      laserActive = false;
      if (laserLine) laserLine.setAttribute('opacity', '0');
      if (laserDot) laserDot.setAttribute('opacity', '0');
      if (laserHoverEl) {
        laserHoverEl.classList.remove('laser-hover');
        laserHoverEl = null;
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) return;
      laserActive = false;
      if (laserLine) laserLine.setAttribute('opacity', '0');
      if (laserDot) laserDot.setAttribute('opacity', '0');
      if (laserHoverEl) {
        laserHoverEl.classList.remove('laser-hover');
        laserHoverEl = null;
      }
      console.log('[gunCursor] visibilitychange hidden -> hide');
      if (gunCursorEl) gunCursorEl.style.display = 'none';
      document.body.classList.remove('hide-native-cursor');
    });

    (function shakeToGrayscale() {
      const SHAKE_WINDOW_MS = 250;
      const SHAKE_DIR_CHANGES = 3;
      const SHAKE_DURATION_MS = 1000;
      const MIN_DELTA = 2;
      const buffer = [];
      let shakeStartTime = null;
      let grayscaleApplied = false;

      function isShaking() {
        const now = performance.now();
        const cutoff = now - SHAKE_WINDOW_MS;
        const recent = buffer.filter(p => p.t >= cutoff);
        if (recent.length < 3) return false;
        let dirChanges = 0;
        for (let i = 1; i < recent.length - 1; i++) {
          const dx1 = recent[i].x - recent[i - 1].x;
          const dx2 = recent[i + 1].x - recent[i].x;
          const dy1 = recent[i].y - recent[i - 1].y;
          const dy2 = recent[i + 1].y - recent[i].y;
          if (Math.abs(dx1) >= MIN_DELTA && Math.abs(dx2) >= MIN_DELTA && (dx1 > 0) !== (dx2 > 0)) dirChanges++;
          if (Math.abs(dy1) >= MIN_DELTA && Math.abs(dy2) >= MIN_DELTA && (dy1 > 0) !== (dy2 > 0)) dirChanges++;
        }
        return dirChanges >= SHAKE_DIR_CHANGES;
      }

      document.addEventListener('mousemove', (e) => {
        if (grayscaleApplied) return;
        const now = performance.now();
        buffer.push({ x: e.clientX, y: e.clientY, t: now });
        while (buffer.length > 0 && buffer[0].t < now - 400) buffer.shift();

        if (isShaking()) {
          if (shakeStartTime == null) shakeStartTime = now;
          else if (now - shakeStartTime >= SHAKE_DURATION_MS) {
            document.body.classList.add('grayscale-mode');
            grayscaleApplied = true;
          }
        } else {
          shakeStartTime = null;
        }
      });
    })();

    let laserHoverEl = null;
    (function animateLaser() {
      const inTattoosGallery = sectionOverlay.classList.contains('tattoos-modal') && sectionOverlay.classList.contains('expanding');
      if (inTattoosGallery || !laserActive) {
        laserLine.setAttribute('opacity', '0');
        laserDot.setAttribute('opacity', '0');
        if (laserHoverEl) {
          laserHoverEl.classList.remove('laser-hover');
          laserHoverEl = null;
        }
      } else {
        const _angle = effectiveShootAngle();
        const { dist, el } = raycastLaser(mouseX, mouseY, _angle);
        const x2 = mouseX + Math.cos(_angle) * dist;
        const y2 = mouseY + Math.sin(_angle) * dist;
        laserLine.setAttribute('x1', mouseX);
        laserLine.setAttribute('y1', mouseY);
        laserLine.setAttribute('x2', x2);
        laserLine.setAttribute('y2', y2);

        laserDot.setAttribute('cx', x2);
        laserDot.setAttribute('cy', y2);

        const pulse = 0.35 + Math.sin(performance.now() * 0.008) * 0.15
                           + Math.sin(performance.now() * 0.023) * 0.1;
        laserLine.setAttribute('opacity', pulse);
        laserDot.setAttribute('opacity', pulse + 0.25);

        if (el !== laserHoverEl) {
          if (laserHoverEl) laserHoverEl.classList.remove('laser-hover');
          laserHoverEl = el;
          if (el) el.classList.add('laser-hover');
        }
      }

      requestAnimationFrame(animateLaser);
    })();

    if (!tmpImg.complete) {
      applyCursor(hotX, hotY);
      updatePreview();
    }
  </script>

  <!-- RAT -->
  <img id="site-rat" src="img/rat.png" alt=""
    style="
      position: fixed;
      top: 0;
      left: -120px;
      width: 80px;
      height: auto;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
      image-rendering: pixelated;
    "
  >
  <script>
    (function() {
      const rat = document.getElementById('site-rat');
      const speed = 0.5;
      let x, y, dirX, dirY, running = false;

      function initPos() {
        const rw = rat.offsetWidth || 80;
        const rh = rat.offsetHeight || 50;
        const vh = window.innerHeight;
        x = -rw;
        y = vh - rh;         // start at floor
        dirX = 1;
        dirY = -1;           // initially drifting up
      }

      const overlay = document.getElementById('sectionOverlay');

      function stepRat() {
        if (!running) return;

        const modalOpen = overlay && overlay.classList.contains('expanding');
        rat.style.opacity = modalOpen ? '0' : '1';

        if (!modalOpen) {
          const rw = rat.offsetWidth || 80;
          const rh = rat.offsetHeight || 50;
          const vw = window.innerWidth;
          const vh = window.innerHeight;
          const floorY  = vh - rh;
          const ceilY   = vh * 0.75 - rh;

          x += speed * dirX;
          y += speed * 0.4 * dirY;

          if (dirX === 1  && x > vw + 10)   { x = vw + 10;  dirX = -1; }
          if (dirX === -1 && x < -rw - 10)  { x = -rw - 10; dirX = 1; }

          if (y < ceilY)  { y = ceilY;  dirY = 1; }
          if (y > floorY) { y = floorY; dirY = -1; }

          rat.style.left = x + 'px';
          rat.style.top  = y + 'px';
          rat.style.transform = dirX === 1 ? 'scaleX(-1)' : 'scaleX(1)';
        }

        requestAnimationFrame(stepRat);
      }

      setTimeout(function() {
        initPos();
        rat.style.opacity = '1';
        running = true;
        requestAnimationFrame(stepRat);
      }, 2000);
    })();
  </script>
