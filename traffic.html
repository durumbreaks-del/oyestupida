<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard | Oye Estupida</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #000;
      color: #ff00c0;
      min-height: 100vh;
      padding: 40px;
    }
    h1 {
      text-align: center;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      border: 2px solid #ff00c0;
      padding: 20px;
      text-align: center;
      background: rgba(255, 0, 192, 0.05);
    }
    .stat-value {
      font-size: 48px;
      font-weight: bold;
      margin: 10px 0;
    }
    .stat-label {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ff00c0;
      padding: 10px;
      text-align: left;
    }
    th {
      background: rgba(255, 0, 192, 0.2);
      text-transform: uppercase;
      font-size: 12px;
    }
    .controls {
      margin-bottom: 20px;
      text-align: center;
    }
    button {
      background: transparent;
      border: 2px solid #ff00c0;
      color: #ff00c0;
      padding: 10px 20px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0 5px;
    }
    button:hover {
      background: rgba(255, 0, 192, 0.2);
    }
    .empty {
      text-align: center;
      padding: 60px;
      opacity: 0.5;
    }
    .protected {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .protected input {
      background: transparent;
      border: 2px solid #ff00c0;
      color: #ff00c0;
      padding: 15px 20px;
      font-family: inherit;
      font-size: 16px;
      width: 300px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="protected" class="protected">
    <h2>ENTER PASSWORD</h2>
    <input type="password" id="password" placeholder="Password..." autocomplete="off">
    <button onclick="checkPassword()">ACCESS</button>
  </div>

  <div id="dashboard" class="hidden">
    <h1>Oye Estupida Analytics</h1>
    
    <div class="controls">
      <button onclick="refreshData()">Refresh</button>
      <button onclick="generateTestData()">Generate Test Data</button>
      <button onclick="exportData()">Export CSV</button>
      <button onclick="clearData()">Clear All</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Visits</div>
        <div class="stat-value" id="totalVisits">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unique Sessions</div>
        <div class="stat-value" id="uniqueSessions">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Clicks</div>
        <div class="stat-value" id="totalClicks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Form Submissions</div>
        <div class="stat-value" id="formSubmissions">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Time on Site</div>
        <div class="stat-value" id="avgTime">0s</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Events</div>
        <div class="stat-value" id="totalEvents">0</div>
      </div>
    </div>

    <h2>Recent Activity</h2>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Session</th>
          <th>Event</th>
          <th>Details</th>
          <th>Screen</th>
        </tr>
      </thead>
      <tbody id="activityTable">
      </tbody>
    </table>
  </div>

  <script>
    const ADMIN_PASSWORD = 'oye2024'; // Change this in production
    
    function checkPassword() {
      const input = document.getElementById('password').value;
      if (input === ADMIN_PASSWORD) {
        document.getElementById('protected').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        refreshData();
      } else {
        alert('Invalid password');
      }
    }
    
    function getData() {
      return JSON.parse(localStorage.getItem('oye_analytics') || '[]');
    }
    
    function refreshData() {
      const data = getData();
      const sessions = [...new Set(data.map(e => e.session))];
      const pageviews = data.filter(e => e.type === 'pageview');
      const clicks = data.filter(e => e.type === 'click');
      const forms = data.filter(e => e.type === 'form_submit');
      const exits = data.filter(e => e.type === 'page_exit');
      
      document.getElementById('totalVisits').textContent = pageviews.length;
      document.getElementById('uniqueSessions').textContent = sessions.length;
      document.getElementById('totalClicks').textContent = clicks.length;
      document.getElementById('formSubmissions').textContent = forms.length;
      document.getElementById('totalEvents').textContent = data.length;
      
      const avgTime = exits.length > 0 
        ? Math.round(exits.reduce((a, b) => a + (b.duration || 0), 0) / exits.length)
        : 0;
      document.getElementById('avgTime').textContent = avgTime + 's';
      
      // Update table
      const tbody = document.getElementById('activityTable');
      tbody.innerHTML = '';
      
      data.slice().reverse().slice(0, 50).forEach(event => {
        const row = tbody.insertRow();
        row.innerHTML = `
          <td>${new Date(event.timestamp).toLocaleString()}</td>
          <td>${event.session?.substring(0, 15)}...</td>
          <td>${event.type}</td>
          <td>${JSON.stringify(event.element || event.formId || '')}</td>
          <td>${event.screenSize}</td>
        `;
      });
    }
    
    function exportData() {
      const data = getData();
      if (data.length === 0) {
        alert('No data to export');
        return;
      }
      
      const csv = [
        ['Timestamp', 'Session', 'Type', 'URL', 'Element', 'Screen', 'Duration'].join(','),
        ...data.map(e => [
          e.timestamp,
          e.session,
          e.type,
          e.url,
          (e.element || e.formId || '').replace(/,/g, ' '),
          e.screenSize,
          e.duration || ''
        ].join(','))
      ].join('\n');
      
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `analytics_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }
    
    function clearData() {
      if (confirm('Clear all analytics data?')) {
        localStorage.removeItem('oye_analytics');
        localStorage.removeItem('oye_session');
        refreshData();
      }
    }
    
    function generateTestData() {
      const testData = [];
      const now = new Date();
      
      // Generate 5 test sessions with various events
      for (let i = 0; i < 5; i++) {
        const sessionId = 'test_sess_' + i + '_' + Date.now();
        const baseTime = new Date(now - i * 60000); // Each session 1 min apart
        
        // Pageview
        testData.push({
          timestamp: baseTime.toISOString(),
          session: sessionId,
          type: 'pageview',
          url: 'https://oyeestupida.com/',
          referrer: 'https://google.com',
          userAgent: 'Mozilla/5.0 Test Browser',
          screenSize: '1920x1080',
          language: 'en-US'
        });
        
        // Some clicks
        testData.push({
          timestamp: new Date(baseTime.getTime() + 5000).toISOString(),
          session: sessionId,
          type: 'click',
          url: 'https://oyeestupida.com/',
          element: 'tattoos-btn',
          screenSize: '1920x1080'
        });
        
        testData.push({
          timestamp: new Date(baseTime.getTime() + 8000).toISOString(),
          session: sessionId,
          type: 'click',
          url: 'https://oyeestupida.com/',
          element: 'cakes-btn',
          screenSize: '1920x1080'
        });
        
        // Form submission for some sessions
        if (i % 2 === 0) {
          testData.push({
            timestamp: new Date(baseTime.getTime() + 15000).toISOString(),
            session: sessionId,
            type: 'form_submit',
            url: 'https://oyeestupida.com/',
            formId: 'cakes-order-form',
            screenSize: '1920x1080'
          });
        }
        
        // Page exit
        testData.push({
          timestamp: new Date(baseTime.getTime() + 30000 + Math.random() * 60000).toISOString(),
          session: sessionId,
          type: 'page_exit',
          url: 'https://oyeestupida.com/',
          duration: Math.round(30 + Math.random() * 120),
          screenSize: '1920x1080'
        });
      }
      
      // Merge with existing data
      const existing = JSON.parse(localStorage.getItem('oye_analytics') || '[]');
      const merged = [...existing, ...testData];
      localStorage.setItem('oye_analytics', JSON.stringify(merged));
      
      refreshData();
      alert(`Generated ${testData.length} test events from 5 sessions`);
    }
    
    // Auto-refresh every 30 seconds
    setInterval(refreshData, 30000);
  </script>
</body>
</html>
